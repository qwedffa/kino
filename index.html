<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>
<body>
 
<style>
    .hero-bg {
      background-size: cover;
      background-position: center;
      transition: opacity 0.8s ease-in-out;
    }
    .movie-card {
      transition: all 0.3s ease;
    }
    .movie-card:hover {
      transform: scale(1.08);
      z-index: 10;
    }
    .genre-btn {
      transition: all 0.2s ease;
    }
    .genre-btn.active {
      background-color: #dc2626;
      color: white;
      border-color: #dc2626;
    }
    .heart {
      transition: all 0.2s ease;
    }
    .heart.liked {
      color: #ef4444;
      transform: scale(1.2);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  
  <nav class="bg-black/95 backdrop-blur-md border-b border-zinc-800 fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <h1 class="text-3xl font-bold text-red-600">Netflix</h1>
      </div>
      <div class="flex-1 max-w-xl mx-8">
        <div class="relative">
          <input type="text" id="searchInput" placeholder="Поиск по названию..."
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-full py-3 px-6 pl-12 focus:outline-none focus:border-red-600">
          <i class="fas fa-search absolute left-5 top-3.5 text-gray-400"></i>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <button onclick="showFavorites()" class="flex items-center gap-2 hover:text-red-500 transition">
          <i class="fas fa-heart text-xl"></i>
          <span id="favCount" class="text-sm font-medium">0</span>
        </button>
        <button class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-full text-sm font-medium transition">Войти</button>
      </div>
    </div>
  </nav>

  
  <section id="heroSlider" class="relative h-screen overflow-hidden pt-16">
    <div id="slides" class="absolute inset-0">

      
      <div class="hero-slide absolute inset-0 hero-bg flex items-center" 
           style="background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.8)), url('img/oppenheimermain.jpg')">
        <div class="max-w-7xl mx-auto px-6 relative z-10">
          <h2 class="text-7xl font-bold mb-4">OPPENHEIMER</h2>
          <p class="text-3xl text-gray-200 mb-6">2023 • Биография • 3ч</p>
          <div class="flex items-center gap-6 mb-8">
            <div class="flex items-center gap-2 text-4xl">
              <span class="text-yellow-400">★</span>
              <span class="font-bold">8.3</span>
            </div>
            <span class="bg-red-600 px-6 py-2 rounded-full text-sm font-medium">IMDb Top</span>
          </div>
          <button class="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-full text-xl font-medium flex items-center gap-4 transition">
            <i class="fas fa-play"></i> Смотреть сейчас
          </button>
        </div>
      </div>

      
      <div class="hero-slide absolute inset-0 hero-bg flex items-center opacity-0" 
           style="background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.8)), url('img/batman.png')">
        <div class="max-w-7xl mx-auto px-6 relative z-10">
          <h2 class="text-7xl font-bold mb-4 text-yellow-400">THE BATMAN</h2>
          <p class="text-3xl text-gray-200 mb-6">2022 • Экшн • 2ч 56м</p>
          <div class="flex items-center gap-6 mb-8">
            <div class="flex items-center gap-2 text-4xl">
              <span class="text-yellow-400">★</span>
              <span class="font-bold">8.7</span>
            </div>
          </div>
          <button class="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-full text-xl font-medium flex items-center gap-4 transition">
            <i class="fas fa-play"></i> Смотреть сейчас
          </button>
        </div>
      </div>

      
      <div class="hero-slide absolute inset-0 hero-bg flex items-center opacity-0" 
           style="background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.8)), url('img/dune2024.jpg')">
        <div class="max-w-7xl mx-auto px-6 relative z-10">
          <h2 class="text-7xl font-bold mb-4">DUNE</h2>
          <p class="text-3xl text-gray-200 mb-6">2024 • Фантастика • 2ч 46м</p>
          <button class="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-full text-xl font-medium flex items-center gap-4 transition">
            <i class="fas fa-play"></i> Смотреть трейлер
          </button>
        </div>
      </div>
    </div>

    
    <button onclick="prevSlide()" 
            class="absolute left-8 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black p-6 rounded-full z-30 text-4xl transition">
      <i class="fas fa-chevron-left"></i>
    </button>
    <button onclick="nextSlide()" 
            class="absolute right-8 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black p-6 rounded-full z-30 text-4xl transition">
      <i class="fas fa-chevron-right"></i>
    </button>

    <!-- Точки -->
    <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex gap-4 z-30" id="dots"></div>
  </section>

  <main class="max-w-7xl mx-auto px-6 py-12">
    <!-- Filters Bar -->
    <div class="flex flex-wrap items-center justify-between gap-6 mb-10">
      <div>
        <h3 class="text-xl font-semibold mb-3">Жанры</h3>
        <div id="genreFilters" class="flex flex-wrap gap-3">
          <button onclick="filterContent()" class="genre-btn active px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm border border-zinc-700" data-genre="all">Все</button>
          <button onclick="filterContent()" class="genre-btn px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm border border-zinc-700" data-genre="action">Боевик</button>
          <button onclick="filterContent()" class="genre-btn px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm border border-zinc-700" data-genre="drama">Драма</button>
          <button onclick="filterContent()" class="genre-btn px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm border border-zinc-700" data-genre="scifi">Фантастика</button>
          <button onclick="filterContent()" class="genre-btn px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm border border-zinc-700" data-genre="thriller">Триллер</button>
          <button onclick="filterContent()" class="genre-btn px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm border border-zinc-700" data-genre="biography">Биография</button>
          <button onclick="filterContent()" class="genre-btn px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm border border-zinc-700" data-genre="fantasy">Фэнтези</button>
          <button onclick="filterContent()" class="genre-btn px-6 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm border border-zinc-700" data-genre="crime">Криминал</button>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <label class="text-gray-400">Сортировать:</label>
        <select id="sortSelect" onchange="filterContent()" class="bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-3 focus:outline-none focus:border-red-600">
          <option value="rating-desc">По рейтингу ↓</option>
          <option value="rating-asc">По рейтингу ↑</option>
          <option value="title-asc">По названию А-Я</option>
          <option value="title-desc">По названию Я-А</option>
        </select>
      </div>
    </div>

    
    <div id="moviesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
  </main>

  <script>
    const movies = [ 
      { id: 1, title: "Oppenheimer", genre: "biography", rating: 8.3, duration: "3ч", img: "img/oppenheimer.jpg" },
      { id: 2, title: "Reacher", genre: "action", rating: 8.1, duration: "50м", img: "img/reacher.jpg" },
      { id: 3, title: "House of the Dragon", genre: "fantasy", rating: 8.5, duration: "1ч", img: "img/houseofdragons.jpg" },
      { id: 4, title: "The Boys", genre: "action", rating: 8.7, duration: "60м", img: "img/theboys.png" },
      { id: 5, title: "Avengers: Endgame", genre: "action", rating: 8.4, duration: "3ч 1м", img: "img/avengers.jpg" },
      { id: 6, title: "Spider-Man: No Way Home", genre: "scifi", rating: 8.3, duration: "2ч 28м", img: "img/spider.jpg" },
      { id: 7, title: "Joker", genre: "drama", rating: 8.4, duration: "2ч 2м", img: "img/joker.jpg" },
      { id: 8, title: "The Last of Us", genre: "drama", rating: 9.0, duration: "50м", img: "img/thelastus.jpg" },
      { id: 9, title: "Peaky Blinders", genre: "crime", rating: 8.8, duration: "60м", img: "img/peakyblinders.png" },
      { id: 10, title: "John Wick: Chapter 4", genre: "action", rating: 7.7, duration: "2ч 49м", img: "img/johnwick.jpg" },
    ];

    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let currentGenre = 'all';
    let isFavoritesMode = false;

    
    let currentSlide = 0;
    const slides = document.querySelectorAll('.hero-slide');
    let autoSlideInterval;

    function showSlide(index) {
      slides.forEach((slide, i) => {
        slide.style.opacity = i === index ? '1' : '0';
        slide.style.zIndex = i === index ? '10' : '1';
      });
      updateDots();
    }

    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length;
      showSlide(currentSlide);
    }

    function prevSlide() {
      currentSlide = (currentSlide - 1 + slides.length) % slides.length;
      showSlide(currentSlide);
    }

    function updateDots() {
      const dotsContainer = document.getElementById('dots');
      dotsContainer.innerHTML = '';
      for (let i = 0; i < slides.length; i++) {
        const dot = document.createElement('button');
        dot.className = `w-4 h-4 rounded-full transition-all ${i === currentSlide ? 'bg-red-600 scale-125' : 'bg-white/50 hover:bg-white/70'}`;
        dot.onclick = () => { 
          currentSlide = i; 
          showSlide(i); 
        };
        dotsContainer.appendChild(dot);
      }
    }

    
    function startAutoSlide() {
      autoSlideInterval = setInterval(() => {
        nextSlide();
      }, 5000); 
    }

    
    function saveFavorites() {
      localStorage.setItem('favorites', JSON.stringify(favorites));
      document.getElementById('favCount').textContent = favorites.length;
    }

    function toggleFavorite(id) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(favId => favId !== id);
      } else {
        favorites.push(id);
      }
      saveFavorites();
      filterContent();
    }

    function isFavorite(id) {
      return favorites.includes(id);
    }

    function renderMovies(filteredMovies) {
      const grid = document.getElementById('moviesGrid');
      grid.innerHTML = '';
      if (filteredMovies.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400"><p class="text-xl">Ничего не найдено 😔</p></div>`;
        return;
      }
      filteredMovies.forEach(movie => {
        const liked = isFavorite(movie.id) ? 'liked' : '';
        const card = `
          <div class="movie-card cursor-pointer group relative">
            <div class="relative rounded-xl overflow-hidden">
              <img src="${movie.img}" class="w-full aspect-[2/3] object-cover group-hover:scale-105 transition-transform duration-300" alt="${movie.title}">
              <div class="absolute bottom-2 right-2 bg-black/70 text-xs px-2 py-0.5 rounded">${movie.duration}</div>
              <button onclick="event.stopImmediatePropagation(); toggleFavorite(${movie.id});" 
                      class="absolute top-3 right-3 text-2xl heart ${liked}">
                <i class="fas fa-heart"></i>
              </button>
            </div>
            <p class="mt-3 font-medium text-lg">${movie.title}</p>
            <p class="text-sm text-gray-400">${movie.rating} ★</p>
          </div>
        `;
        grid.innerHTML += card;
      });
    }

    function filterContent() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      const sortValue = document.getElementById('sortSelect').value;
      let filtered = movies;

      if (currentGenre !== 'all') filtered = filtered.filter(m => m.genre === currentGenre);
      if (searchTerm) filtered = filtered.filter(m => m.title.toLowerCase().includes(searchTerm));
      if (isFavoritesMode) filtered = filtered.filter(m => favorites.includes(m.id));

      filtered.sort((a, b) => {
        if (sortValue === 'rating-desc') return b.rating - a.rating;
        if (sortValue === 'rating-asc') return a.rating - b.rating;
        if (sortValue === 'title-asc') return a.title.localeCompare(b.title);
        if (sortValue === 'title-desc') return b.title.localeCompare(a.title);
      });

      renderMovies(filtered);
    }

    function showFavorites() {
      isFavoritesMode = !isFavoritesMode;
      filterContent();
    }

    
    window.onload = () => {
      document.getElementById('favCount').textContent = favorites.length;
      showSlide(0);
      startAutoSlide();        
      renderMovies(movies);
    };

    
    document.getElementById('searchInput').addEventListener('input', filterContent);
    document.querySelectorAll('.genre-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGenre = btn.getAttribute('data-genre');
        isFavoritesMode = false;
        filterContent();
      });
    });
  </script>




</body>
</html>
